<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0807"/>
      <stop offset="50%" stop-color="#15110D"/>
      <stop offset="100%" stop-color="#0A0807"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#D9A441" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#D9A441" stop-opacity="0"/>
    </radialGradient>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.85  0 0 0 0 0.79  0 0 0 0 0.61  0 0 0 0.025 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" filter="url(#paper)" opacity="0.6"/>

  <!-- thin gold rule (top) -->
  <line x1="80" y1="80" x2="180" y2="80" stroke="#D9A441" stroke-width="0.8" opacity="0.6"/>

  <!-- eyebrow -->
  <text x="80" y="115" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500"
        fill="#D9A441" letter-spacing="3.2" opacity="0.85">THE BHAGAVAD GITA</text>

  <!-- main title (Cormorant Garamond — fall back to serif) -->
  <text x="80" y="220" font-family="'Cormorant Garamond', Georgia, serif"
        font-size="86" font-weight="500" fill="#F0EBE0" letter-spacing="-1">A companion,</text>
  <text x="80" y="310" font-family="'Cormorant Garamond', Georgia, serif"
        font-size="86" font-weight="500" font-style="italic" fill="#D9A441" letter-spacing="-1">not a substitute.</text>

  <!-- subtitle -->
  <text x="80" y="380" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400"
        fill="#C9C2B0" opacity="0.85">An interactive walk through the eighteen chapters,</text>
  <text x="80" y="412" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400"
        fill="#C9C2B0" opacity="0.85">calibrated to who you actually are.</text>

  <!-- feature row (small pills) -->
  <g transform="translate(80, 470)">
    <rect x="0" y="0" width="160" height="36" rx="18" fill="none" stroke="#D9A441" stroke-width="0.8" opacity="0.5"/>
    <text x="80" y="23" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500"
          fill="#D9A441" text-anchor="middle">18 chapters</text>

    <rect x="172" y="0" width="180" height="36" rx="18" fill="none" stroke="#D9A441" stroke-width="0.8" opacity="0.5"/>
    <text x="262" y="23" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500"
          fill="#D9A441" text-anchor="middle">knowledge graph</text>

    <rect x="364" y="0" width="200" height="36" rx="18" fill="none" stroke="#D9A441" stroke-width="0.8" opacity="0.5"/>
    <text x="464" y="23" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500"
          fill="#D9A441" text-anchor="middle">talk to Krishna</text>

    <rect x="576" y="0" width="220" height="36" rx="18" fill="none" stroke="#D9A441" stroke-width="0.8" opacity="0.5"/>
    <text x="686" y="23" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500"
          fill="#D9A441" text-anchor="middle">personal synthesis</text>
  </g>

  <!-- bottom right URL stamp -->
  <text x="1120" y="585" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="400"
        fill="#8A8472" text-anchor="end" letter-spacing="1.5">gita-five.vercel.app</text>

  <!-- decorative chariot wheel mandala in upper right -->
  <g transform="translate(960, 200)" opacity="0.18">
    <circle cx="0" cy="0" r="180" fill="none" stroke="#D9A441" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="150" fill="none" stroke="#D9A441" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#D9A441" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#D9A441" stroke-width="0.6"/>
    <circle cx="0" cy="0" r="6" fill="#D9A441"/>
    <!-- 16 spokes for a chariot wheel -->
    <g stroke="#D9A441" stroke-width="0.5">
      <line x1="0" y1="-180" x2="0" y2="180"/>
      <line x1="-180" y1="0" x2="180" y2="0"/>
      <line x1="-127" y1="-127" x2="127" y2="127"/>
      <line x1="127" y1="-127" x2="-127" y2="127"/>
      <line x1="-69" y1="-166" x2="69" y2="166"/>
      <line x1="69" y1="-166" x2="-69" y2="166"/>
      <line x1="-166" y1="-69" x2="166" y2="69"/>
      <line x1="166" y1="-69" x2="-166" y2="69"/>
    </g>
  </g>

  <!-- thin gold rule (bottom) -->
  <line x1="1020" y1="550" x2="1120" y2="550" stroke="#D9A441" stroke-width="0.8" opacity="0.6"/>
</svg>
